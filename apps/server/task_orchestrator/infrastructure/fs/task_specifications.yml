# Demo Task specification DAG for the report generation pipeline.
# Each entry defines: id, label, description, depends_on (list of task IDs).
# Deprecated or visually noisy tasks are omitted from this demo graph; their enum
# values remain available for database back-compat.
#
# Demo shape:
#   1. Load patient context and external sources.
#   2. Reload three genomic data sets in parallel.
#   3. Join genomic data into treatment matching.
#   4. Export therapy, genomics, evidence, and trials.
#   5. Push the exported outputs.
#   6. Refresh indexes after all pushed outputs complete.

# root tasks

- id: RELOAD_PATIENT_DATA
  label: Reload Patient Data
  description: Load core patient record from the source database.
  depends_on: []

- id: PULL_CLINICAL_EVIDENCE
  label: Pull Clinical Evidence
  description: Fetch clinical evidence data from external source.
  depends_on: []

- id: PULL_RECRUITING_TRIALS
  label: Pull Recruiting Trials
  description: Fetch active recruiting clinical trial data from external source.
  depends_on: []

# genomic reloads

- id: RELOAD_SOMATIC_MUTATIONS
  label: Reload Somatic Mutations
  description: Load somatic mutation calls for the patient.
  depends_on: [RELOAD_PATIENT_DATA]

- id: RELOAD_GERMLINE_MUTATIONS
  label: Reload Germline Mutations
  description: Load germline mutation calls for the patient.
  depends_on: [RELOAD_PATIENT_DATA]

- id: RELOAD_COPY_NUMBER_ALTERATIONS
  label: Reload Copy Number Alterations
  description: Load gene-level copy number alteration data.
  depends_on: [RELOAD_PATIENT_DATA]

# treatment matching

- id: RELOAD_MATCHED_TREATMENTS
  label: Reload Matched Treatments
  description: Match treatments against the patient's genomic alterations.
  depends_on:
    - RELOAD_SOMATIC_MUTATIONS
    - RELOAD_GERMLINE_MUTATIONS
    - RELOAD_COPY_NUMBER_ALTERATIONS

- id: CREATE_TREATMENT_SETTINGS
  label: Create Treatment Settings
  description: Initialise treatment-level display and filtering settings.
  depends_on: [RELOAD_MATCHED_TREATMENTS]

# clinical trials

- id: CLINICAL_TRIALS_MATCHING
  label: Clinical Trials Matching
  description: Match recruiting clinical trials to the patient's profile.
  depends_on: [RELOAD_PATIENT_DATA, PULL_RECRUITING_TRIALS]

# exports

- id: EXPORT_TREATMENTS
  label: Export Treatments
  description: Serialise matched treatments into report output format.
  depends_on: [RELOAD_MATCHED_TREATMENTS]

- id: EXPORT_TREATMENT_SETTINGS
  label: Export Treatment Settings
  description: Serialise treatment display settings into report output format.
  depends_on: [CREATE_TREATMENT_SETTINGS]

- id: EXPORT_THERAPY_NODE
  label: Export Therapy Node
  description: Build the therapy node tree from treatments and settings.
  depends_on: [EXPORT_TREATMENTS, EXPORT_TREATMENT_SETTINGS]

- id: EXPORT_SOMATIC_MUTATIONS
  label: Export Somatic Mutations
  description: Serialise somatic mutations into report output format.
  depends_on: [RELOAD_SOMATIC_MUTATIONS]

- id: EXPORT_GERMLINE_MUTATIONS
  label: Export Germline Mutations
  description: Serialise germline mutations into report output format.
  depends_on: [RELOAD_GERMLINE_MUTATIONS]

- id: EXPORT_COPY_NUMBER_ALTERATIONS
  label: Export Copy Number Alterations
  description: Serialise gene-level CNA data into report output format.
  depends_on: [RELOAD_COPY_NUMBER_ALTERATIONS]

- id: EXPORT_CLINICAL_EVIDENCE
  label: Export Clinical Evidence
  description: Serialise matched clinical evidence into report output format.
  depends_on: [RELOAD_MATCHED_TREATMENTS, PULL_CLINICAL_EVIDENCE]

- id: EXPORT_RECRUITING_TRIALS
  label: Export Recruiting Trials
  description: Serialise matched recruiting trials into report output format.
  depends_on: [CLINICAL_TRIALS_MATCHING]

# push

- id: PUSH_THERAPY_NODE
  label: Push Therapy Node
  description: Send therapy node tree to the external report system.
  depends_on: [EXPORT_THERAPY_NODE]

- id: PUSH_SOMATIC_MUTATIONS
  label: Push Somatic Mutations
  description: Send somatic mutation data to the external report system.
  depends_on: [EXPORT_SOMATIC_MUTATIONS]

- id: PUSH_GERMLINE_MUTATIONS
  label: Push Germline Mutations
  description: Send germline mutation data to the external report system.
  depends_on: [EXPORT_GERMLINE_MUTATIONS]

- id: PUSH_COPY_NUMBER_ALTERATIONS
  label: Push Copy Number Alterations
  description: Send CNA data to the external report system.
  depends_on: [EXPORT_COPY_NUMBER_ALTERATIONS]

- id: PUSH_CLINICAL_EVIDENCE
  label: Push Clinical Evidence
  description: Send clinical evidence data to the external report system.
  depends_on: [EXPORT_CLINICAL_EVIDENCE]

- id: PUSH_CLINICAL_TRIALS
  label: Push Clinical Trials
  description: Send matched clinical trial data to the external report system.
  depends_on: [EXPORT_RECRUITING_TRIALS]

# finalise

- id: REFRESH_INDEXES
  label: Refresh Indexes
  description: Rebuild search and display indexes after all data has been pushed.
  depends_on:
    - PUSH_THERAPY_NODE
    - PUSH_SOMATIC_MUTATIONS
    - PUSH_GERMLINE_MUTATIONS
    - PUSH_COPY_NUMBER_ALTERATIONS
    - PUSH_CLINICAL_EVIDENCE
    - PUSH_CLINICAL_TRIALS
